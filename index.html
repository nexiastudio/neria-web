<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0614;
  --bg2:#150929;
  --pink:oklch(0.72 0.22 350);
  --pink-hot:oklch(0.68 0.28 8);
  --violet:oklch(0.55 0.25 300);
  --orange:oklch(0.72 0.18 50);
  --gold:oklch(0.80 0.14 68);
  --text:#ffffff;
  --muted:#b0a8c8;
  --dim:#6b6288;
  --border:rgba(180,130,255,0.15);
  --border-hi:rgba(200,150,255,0.3);
  --card-bg:rgba(25,15,55,0.55);
}
html{scroll-behavior:smooth}
body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);color:var(--text);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
.label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--orange);display:block;margin-bottom:16px}
.wrap{max-width:1200px;margin:0 auto;padding:0 40px}
section{padding:120px 0;position:relative}

.accent{
  background:linear-gradient(135deg,var(--pink) 0%,var(--violet) 60%,var(--orange) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.gcard{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:20px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  position:relative;transition:all .3s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
}
.gcard:hover{
  border-color:var(--border-hi);
  transform:translateY(-3px);
  box-shadow:0 20px 50px rgba(120,60,200,0.18),inset 0 1px 0 rgba(255,255,255,0.08);
}

.btn-glow{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--orange),var(--pink-hot) 60%,var(--violet));
  color:white;font-family:'Poppins',sans-serif;
  font-size:14px;font-weight:600;padding:14px 32px;
  border-radius:100px;border:none;cursor:pointer;
  text-decoration:none;transition:all .25s;
  box-shadow:0 4px 24px oklch(0.68 0.28 8 / 0.45);
  letter-spacing:0.01em;position:relative;z-index:2;
}
.btn-glow:hover{box-shadow:0 8px 40px oklch(0.68 0.28 8 / 0.7);transform:translateY(-2px)}
.btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(180,130,255,0.08);color:var(--text);
  font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;
  padding:13px 26px;border-radius:100px;border:1px solid var(--border-hi);
  cursor:pointer;text-decoration:none;transition:all .25s;
}
.btn-ghost:hover{background:rgba(180,130,255,0.15);border-color:var(--pink)}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(10,6,20,0.7);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 40px;height:72px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--pink-hot),var(--violet));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px oklch(0.55 0.25 300 / 0.5);
}
.logo-text{font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-links a{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;font-weight:400}
.nav-links a:hover{color:var(--text)}

@media(max-width:768px){.nav-links a:not(.btn-glow){display:none}.wrap{padding:0 20px}section{padding:80px 0}}
</style>

  }}>
    {/* Cosmic scene anchored to right side */}
    <div style={{position:'absolute',right:'-100px',top:'-40px',width:800,height:800,opacity:0.95}}>
      <CosmicScene/>
    </div>

    <div className="wrap" style={{width:'100%',display:'flex',alignItems:'center',gap:72,padding:'80px 40px',flexWrap:'wrap',position:'relative',zIndex:2}}>
      <div style={{flex:'1 1 420px',maxWidth:600}}>

        <h1 style={{

              <IconCheck/>{t}
            </div>
          ))}
        </div>

/* ── APP ── */
const App = () => {
  const [cfg] = React.useState(TWEAK_DEFAULTS);
  const [avatarSrc, setAvatarSrc] = React.useState(null);
  const fileRef = React.useRef();

  const handleAvatarFile = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => setAvatarSrc(ev.target.result);
    reader.readAsDataURL(file);
  };

  const hl = headlines[cfg.hl]||headlines[0];
  const cta = ctaLabels[cfg.cta]||ctaLabels[0];

  return <>
    <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleAvatarFile}/>
    <Nav ctaLabel={cta}/>
    <Hero hl={hl} ctaLabel={cta} avatarSrc={avatarSrc} avatarType={cfg.av} onAvatarClick={()=>fileRef.current.click()}/>
    <HowItWorks/>
    <ForWhom/>
    <Integrations/>
    <Comparison/>
    <Pricing ctaLabel={cta}/>
    <Testimonials/>
    <FinalCTA ctaLabel={cta}/>
    <Footer/>
  </>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

<script>
// Twinkling stars + bokeh particles
(function(){
  const c=document.getElementById('stars');
  const ctx=c.getContext('2d');
  let W,H,pts=[],bokeh=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  function init(){
    pts=[];bokeh=[];
    for(let i=0;i<140;i++) pts.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.4+0.2,
      dx:(Math.random()-.5)*0.08,dy:(Math.random()-.5)*0.08,
      tw:Math.random()*Math.PI*2,sp:Math.random()*0.02+0.005,
    });
    for(let i=0;i<18;i++) bokeh.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*40+20,
      dy:-(Math.random()*0.25+0.08),dx:(Math.random()-.5)*0.1,
      hue:Math.random()<0.5?[270,320,350]:[30,50,20],
      a:Math.random()*0.08+0.03,
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    // Bokeh first
    bokeh.forEach(b=>{
      const h=b.hue[Math.floor(Math.random()*3)];
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      g.addColorStop(0,`hsla(${h},90%,65%,${b.a})`);
      g.addColorStop(1,`hsla(${h},90%,65%,0)`);
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
      b.y+=b.dy;b.x+=b.dx;
      if(b.y+b.r<0){b.y=H+b.r;b.x=Math.random()*W}
    });
    // Stars
    pts.forEach(p=>{
      p.tw+=p.sp;
      const a=(Math.sin(p.tw)*0.5+0.5)*0.8+0.2;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(230,210,255,${a*0.7})`;ctx.fill();
      p.x+=p.dx;p.y+=p.dy;
      if(p.x<0||p.x>W) p.dx*=-1;
      if(p.y<0||p.y>H) p.dy*=-1;
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();init()});
  resize();init();draw();
})();
</script>
