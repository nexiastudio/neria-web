/* ── PHONE MOCKUP ANIMADO ── */
const MSGS = [
  {from:'patient', name:'Valentina R.', text:'Hola, quería sacar turno para limpieza el viernes a la tarde 🙏', time:'21:14'},
  {from:'neria', text:'¡Hola Valentina! Tenemos disponible el viernes 30 a las 15:00 hs con el Dr. Méndez. ¿Te confirmo ese horario?', time:'21:14'},
  {from:'patient', text:'Sí, perfecto!', time:'21:15'},

];

const DELAYS = [800, 2200, 4800, 6200];
const TYPING_BEFORE = [false, true, false, true];
const RESET_AFTER = 10000;

const PhoneMockup = () => {
  const [visible, setVisible] = React.useState(0);
  const [typing, setTyping] = React.useState(false);
  const chatRef = React.useRef(null);

  React.useEffect(() => {
    if (chatRef.current) {
      chatRef.current.scrollTop = chatRef.current.scrollHeight;
    }
  }, [visible, typing]);

  React.useEffect(() => {
    let timers = [];
    let reset;

    const run = () => {
      setVisible(0);
      setTyping(false);
      MSGS.forEach((m, i) => {
        if (TYPING_BEFORE[i]) {
          timers.push(setTimeout(() => setTyping(true), DELAYS[i] - 900));
        }
        timers.push(setTimeout(() => {
          setTyping(false);
          setVisible(v => v + 1);
        }, DELAYS[i]));
      });
      reset = setTimeout(() => { timers.forEach(clearTimeout); run(); }, RESET_AFTER);
    };

    run();
    return () => { timers.forEach(clearTimeout); clearTimeout(reset); };
  }, []);

  return (
    <div style={{background:'#1a1a2e',borderRadius:38,padding:'3px',boxShadow:'0 32px 80px rgba(0,0,0,0.22),0 0 0 1px rgba(255,255,255,0.06)',width:270,flexShrink:0}}>

          <div style={{flex:1}}>
            <div style={{color:'white',fontSize:13,fontWeight:600,lineHeight:1.2}}>Neria · Consultorio</div>
            <div style={{color:'rgba(255,255,255,0.72)',fontSize:11}}>en línea ahora</div>
          </div>
          <div style={{width:8,height:8,background:'#4ade80',borderRadius:'50%'}}/>
        </div>
        <div ref={chatRef} style={{background:'#e5ddd5',padding:'10px',display:'flex',flexDirection:'column',gap:8,height:520,overflowY:'auto',scrollBehavior:'smooth'}}>
          {MSGS.slice(0, visible).map((m, i) => (
            <div key={i} style={{display:'flex',flexDirection:'column',alignSelf:m.from==='patient'?'flex-start':'flex-end',maxWidth:'85%',animation:'msgIn 0.3s ease'}}>
              {m.from==='patient' && <span style={{fontSize:10,color:'#0c6b82',fontWeight:600,marginBottom:2,paddingLeft:2}}>{m.name}</span>}
              <div style={{background:m.from==='patient'?'white':'#d9fdd3',borderRadius:m.from==='patient'?'8px 8px 8px 2px':'8px 8px 2px 8px',padding:'7px 10px',fontSize:11.5,lineHeight:1.5,color:'#111',whiteSpace:'pre-line'}}>
                {m.text}
                <div style={{fontSize:9.5,color:'rgba(0,0,0,0.38)',textAlign:'right',marginTop:3}}>{m.time}{m.from==='neria'&&' ✓✓'}</div>
              </div>
            </div>
          ))}
          {typing && (
            <div style={{display:'flex',gap:4,alignItems:'center',background:'white',borderRadius:'8px 8px 8px 2px',padding:'8px 12px',width:'fit-content',alignSelf:'flex-start',animation:'msgIn 0.2s ease'}}>

              ))}

          )}
        </div>
      </div>
    </div>
  );
};
